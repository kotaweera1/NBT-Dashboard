<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prism — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark" id="logo-icon"></div>
      <span class="logo-name" id="logo-name"></span>
    </div>
    <nav class="nav-section" id="nav-section"></nav>
    <div class="sidebar-footer">
      <div class="avatar" id="user-initials"></div>
      <div>
        <div class="avatar-name" id="user-name"></div>
        <div class="avatar-role" id="user-role"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div>
        <div class="page-title" id="page-title"></div>
        <div class="page-sub" id="page-sub"></div>
      </div>
      <div class="topbar-right">
        <button class="btn-ghost"><i class="ti ti-calendar"></i> May 2026</button>
        <button class="btn-ghost"><i class="ti ti-download"></i> Export</button>
        <button class="btn-primary"><i class="ti ti-plus"></i> New report</button>
      </div>
    </div>

    <!-- Metrics -->
    <div class="metrics" id="metrics"></div>

    <!-- Charts Row -->
    <div class="charts-row">
      <div class="card" id="revenue-card"></div>
      <div class="card" id="traffic-card"></div>
    </div>

    <!-- Bottom Row -->
    <div class="bottom-row">
      <div class="card" id="orders-card"></div>
      <div class="card" id="products-card"></div>
    </div>

  </main>

  <script>
    /* ── Mockup data (inlined from data.json — no server needed) ── */
    /* To swap in real data: replace the values below or wire up your own fetch() */
    const DATA = {"app":{"name":"Prism","logoIcon":"ti-chart-dots-3"},"user":{"initials":"JK","name":"Jamie Kim","role":"Admin"},"nav":{"main":[{"label":"Overview","icon":"ti-layout-dashboard","active":true},{"label":"Analytics","icon":"ti-chart-bar"},{"label":"Orders","icon":"ti-shopping-bag"},{"label":"Customers","icon":"ti-users"},{"label":"Products","icon":"ti-package"}],"reports":[{"label":"Revenue","icon":"ti-file-analytics"},{"label":"Geography","icon":"ti-map-pin"},{"label":"Forecasts","icon":"ti-chart-line"}],"settings":[{"label":"Preferences","icon":"ti-settings"},{"label":"Alerts","icon":"ti-bell"}]},"page":{"title":"Overview","subtitle":"May 2026 · All stores"},"metrics":[{"label":"Total revenue","value":"$84,320","icon":"ti-currency-dollar","iconBg":"#EEEDFE","iconColor":"#534AB7","delta":"+12.4%","deltaType":"up","deltaLabel":"vs last month"},{"label":"New customers","value":"1,482","icon":"ti-users","iconBg":"#E1F5EE","iconColor":"#1D9E75","delta":"+8.1%","deltaType":"up","deltaLabel":"vs last month"},{"label":"Avg. order value","value":"$56.90","icon":"ti-receipt","iconBg":"#FAEEDA","iconColor":"#854F0B","delta":"-2.3%","deltaType":"down","deltaLabel":"vs last month"},{"label":"Conversion rate","value":"3.7%","icon":"ti-target","iconBg":"#FBEAF0","iconColor":"#993556","delta":"+0.5%","deltaType":"up","deltaLabel":"vs last month"}],"revenueChart":{"title":"Revenue by month","subtitle":"2026 vs 2025 comparison","color2026":"#534AB7","color2025":"#CECBF6","months":[{"month":"Jan","y2025":52,"y2026":68},{"month":"Feb","y2025":60,"y2026":74},{"month":"Mar","y2025":44,"y2026":58},{"month":"Apr","y2025":70,"y2026":92},{"month":"May","y2025":58,"y2026":112},{"month":"Jun","y2025":80,"y2026":88},{"month":"Jul","y2025":65,"y2026":76},{"month":"Aug","y2025":90,"y2026":100},{"month":"Sep","y2025":72,"y2026":96},{"month":"Oct","y2025":84,"y2026":108},{"month":"Nov","y2025":96,"y2026":116},{"month":"Dec","y2025":104,"y2026":120}]},"trafficSources":{"title":"Traffic sources","totalSessions":3841,"sources":[{"label":"Organic search","percent":47,"color":"#534AB7"},{"label":"Referral","percent":24,"color":"#1D9E75"},{"label":"Paid ads","percent":14,"color":"#EF9F27"},{"label":"Direct","percent":15,"color":"#D3D1C7"}]},"orders":{"title":"Recent orders","subtitle":"Last 5 transactions","rows":[{"initials":"AN","avatarBg":"#EEEDFE","avatarColor":"#534AB7","name":"Amara Nwosu","amount":"$124.00","date":"May 25","status":"Fulfilled"},{"initials":"LF","avatarBg":"#E1F5EE","avatarColor":"#1D9E75","name":"Leon Fischer","amount":"$78.50","date":"May 25","status":"Pending"},{"initials":"YT","avatarBg":"#FAEEDA","avatarColor":"#854F0B","name":"Yuki Tanaka","amount":"$210.00","date":"May 24","status":"Fulfilled"},{"initials":"SP","avatarBg":"#FCEBEB","avatarColor":"#A32D2D","name":"Sara Petrov","amount":"$43.20","date":"May 24","status":"Refunded"},{"initials":"MC","avatarBg":"#EEEDFE","avatarColor":"#534AB7","name":"Marcus Cole","amount":"$89.90","date":"May 23","status":"Fulfilled"}]},"topProducts":{"title":"Top products","subtitle":"By revenue share","items":[{"name":"Wireless Pro Headphones","revenue":"$24,100","percent":28,"barWidth":68,"color":"#534AB7"},{"name":"Mechanical Keyboard X","revenue":"$18,430","percent":22,"barWidth":52,"color":"#1D9E75"},{"name":"4K Webcam Ultra","revenue":"$14,200","percent":17,"barWidth":40,"color":"#EF9F27"},{"name":"USB-C Hub 10-in-1","revenue":"$10,880","percent":13,"barWidth":30,"color":"#D4537E"},{"name":"Laptop Stand Aluminum","revenue":"$8,640","percent":10,"barWidth":24,"color":"#888780"},{"name":"Others","revenue":"$8,070","percent":10,"barWidth":20,"color":"#B4B2A9"}]}};

    render(DATA);

    function render(d) {
      renderApp(d.app);
      renderUser(d.user);
      renderNav(d.nav);
      renderPage(d.page);
      renderMetrics(d.metrics);
      renderRevenueChart(d.revenueChart);
      renderTraffic(d.trafficSources);
      renderOrders(d.orders);
      renderProducts(d.topProducts);
    }

    /* ── App / Logo ── */
    function renderApp(app) {
      document.title = `${app.name} — Dashboard`;
      document.getElementById('logo-icon').innerHTML = `<i class="ti ${app.logoIcon}" style="color:#fff;font-size:16px"></i>`;
      document.getElementById('logo-name').textContent = app.name;
    }

    /* ── User ── */
    function renderUser(user) {
      document.getElementById('user-initials').textContent = user.initials;
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-role').textContent = user.role;
    }

    /* ── Navigation ── */
    function renderNav(nav) {
      const el = document.getElementById('nav-section');
      let html = '';

      html += nav.main.map(item => navItem(item)).join('');

      html += `<div class="nav-label">Reports</div>`;
      html += nav.reports.map(item => navItem(item)).join('');

      html += `<div class="nav-label">Settings</div>`;
      html += nav.settings.map(item => navItem(item)).join('');

      el.innerHTML = html;

      el.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          el.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
          item.classList.add('active');
        });
      });
    }

    function navItem(item) {
      return `<div class="nav-item${item.active ? ' active' : ''}">
        <i class="ti ${item.icon}"></i> ${item.label}
      </div>`;
    }

    /* ── Page title ── */
    function renderPage(page) {
      document.getElementById('page-title').textContent = page.title;
      document.getElementById('page-sub').textContent = page.subtitle;
    }

    /* ── Metric Cards ── */
    function renderMetrics(metrics) {
      document.getElementById('metrics').innerHTML = metrics.map(m => `
        <div class="metric">
          <div class="metric-header">
            <span class="metric-label">${m.label}</span>
            <div class="metric-icon" style="background:${m.iconBg}">
              <i class="ti ${m.icon}" style="color:${m.iconColor}"></i>
            </div>
          </div>
          <div class="metric-value">${m.value}</div>
          <div class="metric-footer">
            <span class="delta delta-${m.deltaType}">
              <i class="ti ti-arrow-${m.deltaType}"></i>${m.delta}
            </span>
            <span class="delta-label">${m.deltaLabel}</span>
          </div>
        </div>
      `).join('');
    }

    /* ── Revenue Bar Chart ── */
    function renderRevenueChart(data) {
      const maxVal = Math.max(...data.months.flatMap(m => [m.y2025, m.y2026]));
      const scale = (v) => Math.round((v / maxVal) * 130);

      const bars = data.months.map(m => `
        <div class="bar-col">
          <div class="bars">
            <div class="bar" style="height:${scale(m.y2025)}px;background:${data.color2025}" title="2025: ${m.y2025}k"></div>
            <div class="bar" style="height:${scale(m.y2026)}px;background:${data.color2026}" title="2026: ${m.y2026}k"></div>
          </div>
          <span class="bar-month">${m.month}</span>
        </div>
      `).join('');

      document.getElementById('revenue-card').innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">${data.title}</div>
            <div class="card-sub">${data.subtitle}</div>
          </div>
        </div>
        <div class="bar-chart-wrap">
          <div class="bar-chart">${bars}</div>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:${data.color2026}"></div>2026</div>
            <div class="legend-item"><div class="legend-dot" style="background:${data.color2025}"></div>2025</div>
          </div>
        </div>
      `;
    }

    /* ── Traffic Donut ── */
    function renderTraffic(data) {
      const circumference = 2 * Math.PI * 52; // r=52
      let offset = 0;
      const circles = data.sources.map(s => {
        const arc = (s.percent / 100) * circumference;
        const circle = `<circle cx="65" cy="65" r="52" fill="none"
          stroke="${s.color}" stroke-width="20"
          stroke-dasharray="${arc.toFixed(1)} ${(circumference - arc).toFixed(1)}"
          stroke-dashoffset="${(-offset).toFixed(1)}"
          transform="rotate(-90 65 65)"/>`;
        offset += arc;
        return circle;
      });

      const legend = data.sources.map(s => `
        <div>
          <div class="source-row">
            <div class="source-left">
              <div class="source-dot" style="background:${s.color}"></div>${s.label}
            </div>
            <span class="source-val">${s.percent}%</span>
          </div>
          <div class="source-bar-wrap">
            <div class="source-bar" style="width:${s.percent}%;background:${s.color}"></div>
          </div>
        </div>
      `).join('');

      document.getElementById('traffic-card').innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">${data.title}</div>
            <div class="card-sub">${data.totalSessions.toLocaleString()} sessions this month</div>
          </div>
        </div>
        <div class="donut-section">
          <div class="donut-center">
            <svg width="130" height="130" viewBox="0 0 130 130">
              ${circles.join('')}
              <text x="65" y="60" text-anchor="middle" font-size="15" font-weight="600" fill="#1A1A18" font-family="sans-serif">${data.totalSessions.toLocaleString()}</text>
              <text x="65" y="75" text-anchor="middle" font-size="11" fill="#A09F9A" font-family="sans-serif">sessions</text>
            </svg>
          </div>
          <div class="source-legend">${legend}</div>
        </div>
      `;
    }

    /* ── Orders Table ── */
    function renderOrders(data) {
      const statusClass = { Fulfilled: 'green', Pending: 'amber', Refunded: 'red' };

      const rows = data.rows.map(r => `
        <tr>
          <td>
            <div class="customer-cell">
              <div class="c-avatar" style="background:${r.avatarBg};color:${r.avatarColor}">${r.initials}</div>
              ${r.name}
            </div>
          </td>
          <td>${r.amount}</td>
          <td class="td-muted">${r.date}</td>
          <td><span class="pill pill-${statusClass[r.status]}">${r.status}</span></td>
        </tr>
      `).join('');

      document.getElementById('orders-card').innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">${data.title}</div>
            <div class="card-sub">${data.subtitle}</div>
          </div>
          <span class="card-action">View all →</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Customer</th><th>Amount</th><th>Date</th><th>Status</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    /* ── Top Products ── */
    function renderProducts(data) {
      const items = data.items.map(p => `
        <div class="progress-row">
          <div class="progress-header">
            <span class="progress-name">${p.name}</span>
            <span class="progress-pct" style="color:${p.color}">${p.revenue} · ${p.percent}%</span>
          </div>
          <div class="progress-bg">
            <div class="progress-fill" style="width:${p.barWidth}%;background:${p.color}"></div>
          </div>
        </div>
      `).join('');

      document.getElementById('products-card').innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">${data.title}</div>
            <div class="card-sub">${data.subtitle}</div>
          </div>
          <span class="card-action">View all →</span>
        </div>
        <div class="progress-section">${items}</div>
      `;
    }
  </script>

</body>
</html>
